<!DOCTYPE html>
<html lang="ja">
<head>
<script>/* auth-early-check */(function(){try{var s=JSON.parse(localStorage.getItem('nitta_auth_v2')||'null');if(s&&s.exp>Date.now()){document.documentElement.setAttribute('data-authed','1');return;}}catch(e){}document.documentElement.setAttribute('data-needs-login','1');})();</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>設定 — 新田西口商店会</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal-common.css">

</helmet>


<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal-common.css">
  
</helmet>

<div style="height:100%;overflow:hidden;background:#e6e6ec;display:flex;justifyContent:center;">
<div style="display:flex;width:100%;maxWidth:1440px;height:100%;overflow:hidden;background:#F5F6F8;boxShadow:0 0 40px rgba(0,0,0,0.08);">

  <!-- ===== SIDEBAR ===== -->
  <div style="width:220px;background:#fff;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid rgba(0,0,0,0.07);zIndex:10;">
    <div style="padding:18px 16px 14px;">
      <img src="uploads/logo-horizontal-clean.png" alt="新田西口商店会" style="width:100%;height:auto;display:block;marginBottom:4px;" onerror="this.style.display='none'" />
      <div style="marginTop:10px;">
        <select value="{{ currentPeriodId }}" onChange="{{ onChangePeriod }}" style="width:100%;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.1);color:#3F414C;fontSize:12px;padding:5px 8px;borderRadius:7px;appearance:none;-webkit-appearance:none;">
          <sc-for list="{{ periodOptions }}" as="opt" hint-placeholder-count="1">
            <option value="{{ opt.id }}">{{ opt.name }}</option>
          </sc-for>
        </select>
      </div>
    </div>
    <div style="flex:1;minHeight:0;overflowY:auto;padding:4px 8px 8px;">
      <sc-for list="{{ navItems }}" as="item" hint-placeholder-count="13">
        <div onClick="{{ item.onClick }}" style="{{ item.navStyle }}">{{ item.label }}</div>
      </sc-for>
    </div>
    <div style="flexShrink:0;padding:10px 14px 14px;borderTop:1px solid rgba(0,0,0,0.06);">
      <div style="display:flex;alignItems:center;gap:6px;marginBottom:3px;">
        <div style="fontSize:10px;color:{{ syncStatusColor }};flex:1;">{{ syncStatusLabel }}</div>
        <button data-variant="info" onClick="{{ onRefreshFromSS }}" style="border:none;background:rgba(231,193,95,0.08);color:#C39425;fontSize:11px;fontWeight:600;cursor:pointer;padding:3px 8px;borderRadius:6px;lineHeight:1.4;" style-hover="background:rgba(231,193,95,0.16);">↻ 更新</button>
      </div>
    </div>
  </div>

  <div id="sync-progress-bar" style="{{ syncProgressBarStyle }}"></div>

  <!-- ===== MAIN ===== -->
  <div id="main-scroll" ref="{{ mainScrollRef }}" style="flex:1;overflowY:auto;background:#F5F6F8;position:relative;">
    <sc-if value="{{ showLoader }}" hint-placeholder-val="{{ false }}">
      <div style="position:fixed;inset:0;background:#FAF8F0;z-index:9990;display:flex;alignItems:center;justifyContent:center;">
        <img src="uploads/logo-splash.png" style="width:180px;" onerror="this.style.display='none'" />
      </div>
    </sc-if>

    <div style="padding:32px 36px;maxWidth:900px;">

      <!-- Header -->
      <div style="display:flex;alignItems:center;justifyContent:space-between;marginBottom:24px;">
        <div>
          <div style="fontFamily:'Zen Kaku Gothic New','Noto Sans JP',sans-serif;fontSize:26px;fontWeight:700;color:#3F414C;letterSpacing:0.02em;">議案作成</div>
          <div style="fontSize:13px;color:#6B7280;marginTop:4px;">起案・稟議書・通知文の作成と管理</div>
        </div>
        <button data-variant="primary" onClick="{{ onNew }}" style="border:none;background:#E7C15F;color:#fff;padding:10px 22px;borderRadius:12px;fontSize:14px;fontWeight:600;">＋ 新規作成</button>
      </div>

      <!-- 種別フィルター -->
      <div style="display:flex;gap:6px;marginBottom:10px;flexWrap:wrap;">
        <sc-for list="{{ typeFilters }}" as="tf" hint-placeholder-count="6">
          <button onClick="{{ tf.onClick }}" style="{{ tf.btnStyle }}">{{ tf.label }}</button>
        </sc-for>
      </div>

      <!-- ステータスフィルター -->
      <div style="display:flex;gap:6px;marginBottom:24px;">
        <sc-for list="{{ statusFilters }}" as="sf" hint-placeholder-count="4">
          <button onClick="{{ sf.onClick }}" style="{{ sf.btnStyle }}">{{ sf.label }}</button>
        </sc-for>
      </div>

      <!-- 空状態 -->
      <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
        <div style="text-align:center;padding:60px 40px;color:#A1A1AA;fontSize:14px;background:#fff;borderRadius:14px;border:1px solid #DDDEE2;">
          <div style="fontSize:36px;marginBottom:14px;">📋</div>
          <div style="fontWeight:600;marginBottom:6px;">議案・稟議書・通知文がありません</div>
          <div style="fontSize:12px;">「新規作成」から追加してください</div>
        </div>
      </sc-if>

      <!-- リスト -->
      <div style="display:flex;flexDirection:column;gap:10px;">
        <sc-for list="{{ proposalList }}" as="pr" hint-placeholder-count="3">
          <div style="background:#fff;borderRadius:14px;padding:18px 22px;border:1px solid #DDDEE2;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s;" onClick="{{ pr.onEdit }}" style-hover="box-shadow:0 4px 16px rgba(0,0,0,0.08);border-color:#AFC3D7;">
            <div style="display:flex;alignItems:center;justifyContent:space-between;marginBottom:10px;">
              <div style="display:flex;alignItems:center;gap:8px;">
                <span style="{{ pr.typeStyle }}">{{ pr.type }}</span>
                <span style="{{ pr.statusStyle }}">{{ pr.status }}</span>
              </div>
              <div style="display:flex;alignItems:center;gap:8px;">
                <span style="fontSize:12px;color:#A1A1AA;">{{ pr.date }}</span>
                <button onClick="{{ pr.onPrint }}" style="border:1px solid #DDDEE2;background:#fff;color:#6B7280;padding:3px 10px;borderRadius:6px;fontSize:11px;" style-hover="background:#F5F6F8;">🖨 印刷</button>
                <button data-variant="danger" onClick="{{ pr.onDelete }}" style="border:none;background:rgba(229,115,115,0.1);color:#E57373;padding:3px 10px;borderRadius:6px;fontSize:11px;" style-hover="background:rgba(229,115,115,0.18);">削除</button>
              </div>
            </div>
            <div style="fontSize:15px;fontWeight:600;color:#3F414C;marginBottom:4px;">{{ pr.title }}</div>
            <div style="fontSize:12px;color:#6B7280;">起案者：{{ pr.author }}</div>
          </div>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</div>

<!-- ===== 編集モーダル ===== -->
<sc-if value="{{ modalShow }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.35);zIndex:200;display:flex;alignItems:flex-start;justifyContent:center;overflowY:auto;paddingTop:40px;paddingBottom:40px;" onClick="{{ onCloseModal }}">
    <div style="background:#fff;borderRadius:16px;padding:28px;width:660px;boxShadow:0 20px 60px rgba(0,0,0,0.25);marginBottom:40px;" onClick="{{ stopProp }}">
      <div style="display:flex;justifyContent:space-between;alignItems:center;marginBottom:22px;">
        <div style="fontFamily:'Zen Kaku Gothic New',sans-serif;fontSize:18px;fontWeight:700;color:#3F414C;">{{ modalTitle }}</div>
        <button data-variant="secondary" onClick="{{ onCloseModal }}" style="border:none;background:rgba(0,0,0,0.05);color:#6B7280;padding:5px 14px;borderRadius:8px;fontSize:13px;">✕ 閉じる</button>
      </div>

      <div style="display:grid;gridTemplateColumns:1fr 1fr;gap:14px;marginBottom:16px;">
        <div>
          <label style="display:block;fontSize:12px;fontWeight:600;color:#6B7280;marginBottom:5px;">種別</label>
          <select data-field="type" value="{{ formData.type }}" onChange="{{ onInput }}" style="width:100%;border:1px solid rgba(0,0,0,0.15);borderRadius:8px;padding:9px 11px;fontSize:13px;background:#fff;">
            <option value="議案">議案</option>
            <option value="稟議書">稟議書</option>
            <option value="通知文">通知文</option>
            <option value="報告書">報告書</option>
            <option value="その他">その他</option>
          </select>
        </div>
        <div>
          <label style="display:block;fontSize:12px;fontWeight:600;color:#6B7280;marginBottom:5px;">ステータス</label>
          <select data-field="status" value="{{ formData.status }}" onChange="{{ onInput }}" style="width:100%;border:1px solid rgba(0,0,0,0.15);borderRadius:8px;padding:9px 11px;fontSize:13px;background:#fff;">
            <option value="起草中">起草中</option>
            <option value="承認済">承認済</option>
            <option value="廃案">廃案</option>
          </select>
        </div>
      </div>

      <div style="marginBottom:14px;">
        <label style="display:block;fontSize:12px;fontWeight:600;color:#6B7280;marginBottom:5px;">タイトル *</label>
        <input type="text" data-field="title" value="{{ formData.title }}" onChange="{{ onInput }}" placeholder="例：令和8年度役員選任の件" style="width:100%;border:1px solid rgba(0,0,0,0.15);borderRadius:8px;padding:9px 12px;fontSize:13px;" />
      </div>

      <div style="display:grid;gridTemplateColumns:1fr 1fr;gap:14px;marginBottom:14px;">
        <div>
          <label style="display:block;fontSize:12px;fontWeight:600;color:#6B7280;marginBottom:5px;">起案日</label>
          <input type="date" data-field="date" value="{{ formData.date }}" onChange="{{ onInput }}" style="width:100%;border:1px solid rgba(0,0,0,0.15);borderRadius:8px;padding:9px 11px;fontSize:13px;" />
        </div>
        <div>
          <label style="display:block;fontSize:12px;fontWeight:600;color:#6B7280;marginBottom:5px;">起案者</label>
          <input type="text" data-field="author" value="{{ formData.author }}" onChange="{{ onInput }}" placeholder="氏名を入力" style="width:100%;border:1px solid rgba(0,0,0,0.15);borderRadius:8px;padding:9px 12px;fontSize:13px;" />
        </div>
      </div>

      <div style="marginBottom:22px;">
        <label style="display:block;fontSize:12px;fontWeight:600;color:#6B7280;marginBottom:5px;">本文</label>
        <textarea data-field="body" value="{{ formData.body }}" onChange="{{ onInput }}" rows="10" placeholder="内容・提案理由・詳細を入力..." style="width:100%;border:1px solid rgba(0,0,0,0.15);borderRadius:8px;padding:9px 12px;fontSize:13px;resize:vertical;lineHeight:1.8;"></textarea>
      </div>

      <div style="display:flex;justifyContent:flex-end;gap:8px;paddingTop:18px;borderTop:1px solid rgba(0,0,0,0.07);">
        <button data-variant="secondary" onClick="{{ onCloseModal }}" style="border:none;background:rgba(0,0,0,0.06);color:#3F414C;padding:9px 18px;borderRadius:8px;fontSize:13px;fontWeight:500;">キャンセル</button>
        <button onClick="{{ onPrintCurrent }}" style="border:1px solid #DDDEE2;background:#fff;color:#3F414C;padding:9px 18px;borderRadius:8px;fontSize:13px;fontWeight:500;">🖨 印刷</button>
        <button data-variant="primary" onClick="{{ onSave }}" style="border:none;background:#E7C15F;color:#fff;padding:9px 20px;borderRadius:8px;fontSize:13px;fontWeight:600;">保存</button>
      </div>
    </div>
  </div>
</sc-if>

<sc-if value="{{ showToast }}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;bottom:28px;right:28px;background:#3F414C;color:#fff;padding:12px 20px;borderRadius:10px;fontSize:13px;fontWeight:500;zIndex:300;boxShadow:0 4px 16px rgba(0,0,0,0.25);">{{ toast }}</div>
</sc-if>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    proposals:[],periods:[],members:[],officers:[],
    currentPeriodId:null,
    toast:null,_tt:null,
    scriptUrl:'',scriptApiKey:'',
    syncStatus:null,loading:false,ssReady:false,syncPaused:false,
    modal:{show:false,editId:null},
    formData:{},
    filterType:'全て',filterStatus:'全て',
  };

  _portalInit=(()=>{
    if(window.PortalMethods)Object.assign(this,window.PortalMethods);
    this._myPages=['proposals'];
  })();

  _mainScrollRef=React.createRef();

  componentDidMount(){
    if(window.PortalMethods)Object.assign(this,window.PortalMethods);
    const url=window.__GAS_URL__||'https://script.google.com/macros/s/AKfycbxU09SfytsO8ylYla2wKNKr_Afuc8vB7HkHCX00htQuU6618fa3iBKGLCOqTN3TDOAtZA/exec';
    const apiKey=localStorage.getItem('nitta_api_key')||'';
    localStorage.setItem('nitta_script_url',url);
    this.setState({scriptUrl:url});
    if(url&&apiKey){
      this.setState({scriptApiKey:apiKey});
      this.loadLocal();
      this.setState({syncStatus:'syncing'});
      setTimeout(()=>this.fetchSheets(url,apiKey,true),50);
      this._timer=setInterval(()=>this.refreshFromSS(true),5*60*1000);
    }else{
      this.loadLocal();
    }
  }

  componentWillUnmount(){if(this._timer)clearInterval(this._timer);}

  _doPrint(pr){
    const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    let body='';
    if((pr.type||'')==='稟議書'){
      body=`
        <div style="font-size:18pt;font-weight:700;text-align:center;letter-spacing:0.2em;border-bottom:2pt solid #000;padding-bottom:8pt;margin-bottom:20pt;">稟　議　書</div>
        <table style="width:100%;border-collapse:collapse;font-size:10pt;margin-bottom:20pt;">
          <tr><td style="padding:5pt 8pt;width:80pt;font-weight:700;border-bottom:0.5pt solid #ddd;">件名</td><td style="padding:5pt 8pt;border-bottom:0.5pt solid #ddd;">${esc(pr.title)}</td></tr>
          <tr><td style="padding:5pt 8pt;font-weight:700;border-bottom:0.5pt solid #ddd;">起案日</td><td style="padding:5pt 8pt;border-bottom:0.5pt solid #ddd;">${esc(pr.date)}</td></tr>
          <tr><td style="padding:5pt 8pt;font-weight:700;border-bottom:0.5pt solid #ddd;">起案者</td><td style="padding:5pt 8pt;border-bottom:0.5pt solid #ddd;">${esc(pr.author)}</td></tr>
        </table>
        <div style="font-size:11pt;font-weight:700;border-bottom:1pt solid #000;padding-bottom:4pt;margin-bottom:12pt;">内容・提案理由</div>
        <div style="font-size:10pt;line-height:2.0;min-height:80pt;margin-bottom:30pt;">${esc(pr.body)}</div>
        <table style="width:100%;border-collapse:collapse;font-size:10pt;">
          <tr>
            <th style="padding:5pt;border:0.5pt solid #000;text-align:center;width:25%;">会長</th>
            <th style="padding:5pt;border:0.5pt solid #000;text-align:center;width:25%;">副会長</th>
            <th style="padding:5pt;border:0.5pt solid #000;text-align:center;width:25%;">担当理事</th>
            <th style="padding:5pt;border:0.5pt solid #000;text-align:center;width:25%;">起案者</th>
          </tr>
          <tr>
            <td style="padding:28pt 5pt;border:0.5pt solid #000;"></td>
            <td style="padding:28pt 5pt;border:0.5pt solid #000;"></td>
            <td style="padding:28pt 5pt;border:0.5pt solid #000;"></td>
            <td style="padding:28pt 5pt;border:0.5pt solid #000;"></td>
          </tr>
        </table>`;
    }else{
      body=`
        <div style="font-size:18pt;font-weight:700;text-align:center;letter-spacing:0.12em;border-bottom:2pt solid #000;padding-bottom:8pt;margin-bottom:10pt;">${esc(pr.type||'文書')}</div>
        <div style="font-size:11pt;text-align:right;color:#333;margin-bottom:18pt;">${esc(pr.date)}</div>
        <div style="font-size:14pt;font-weight:700;margin-bottom:20pt;line-height:1.5;">${esc(pr.title)}</div>
        <div style="font-size:10pt;line-height:2.0;">${esc(pr.body)}</div>`;
    }
    this._openPrintWindow(body,pr.title||'文書');
  }

  renderVals(){
    const{proposals,periods,currentPeriodId,modal,formData,toast,filterType,filterStatus,syncStatus}=this.state;
    const cp=periods.find(p=>p.id===currentPeriodId)||{};
    const TYPES=['全て','議案','稟議書','通知文','報告書','その他'];
    const STATUSES=['全て','起草中','承認済','廃案'];
    const tPal={'議案':['#dbeafe','#1d4ed8'],'稟議書':['#dcfce7','#166534'],'通知文':['#fef9c3','#854d0e'],'報告書':['#f3e8ff','#7e22ce'],'その他':['#f1f5f9','#475569']};
    const sPal={'起草中':['#fff7ed','#c2410c'],'承認済':['#dcfce7','#166534'],'廃案':['#f1f5f9','#9ca3af']};
    const badge=(bg,fg)=>({display:'inline-block',padding:'2px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:'600',background:bg,color:fg,whiteSpace:'nowrap'});
    const fBtn=(label,active,onClick)=>({label,onClick,btnStyle:{border:active?'none':'1px solid #DDDEE2',background:active?'#E7C15F':'#fff',color:active?'#fff':'#3F414C',padding:'5px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:active?'600':'400',cursor:'pointer'}});
    const typeFilters=TYPES.map(t=>fBtn(t,filterType===t,()=>this.setState({filterType:t})));
    const statusFilters=STATUSES.map(s=>fBtn(s,filterStatus===s,()=>this.setState({filterStatus:s})));
    const filtered=(proposals||[]).filter(p=>{
      if(filterType!=='全て'&&p.type!==filterType)return false;
      if(filterStatus!=='全て'&&p.status!==filterStatus)return false;
      return true;
    }).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    const proposalList=filtered.map(pr=>{
      const tp=tPal[pr.type]||tPal['その他'];
      const sp=sPal[pr.status]||sPal['起草中'];
      return{...pr,
        typeStyle:badge(tp[0],tp[1]),
        statusStyle:badge(sp[0],sp[1]),
        onEdit:()=>this.setState({modal:{show:true,editId:pr.id},formData:{...pr}}),
        onPrint:(e)=>{e.stopPropagation();this._doPrint(pr);},
        onDelete:(e)=>{e.stopPropagation();if(!confirm(`「${pr.title}」を削除しますか？`))return;this.setState(s=>({proposals:s.proposals.filter(p=>p.id!==pr.id)}),()=>this.persist());this.showToast('削除しました');},
      };
    });
    const NAV=[
      {id:'dashboard',label:'ダッシュボード'},{id:'officers',label:'役員'},
      {id:'members',label:'会員名簿'},{id:'invoices',label:'請求管理'},
      {id:'ledger',label:'入出金'},{id:'budget',label:'予算'},
      {id:'statements',label:'決算'},{id:'events',label:'事業'},
      {id:'tasks',label:'タスク管理'},{id:'assembly',label:'総会資料'},
      {id:'proposals',label:'議案作成'},{id:'archive',label:'資料庫'},
      {id:'settings',label:'設定'},
    ];
    const navS=(a)=>a
      ?{display:'block',padding:'7px 12px',fontSize:'13px',fontWeight:'500',color:'#C39425',background:'rgba(231,193,95,0.18)',borderRadius:'7px',marginBottom:'2px',cursor:'pointer',userSelect:'none'}
      :{display:'block',padding:'7px 12px',fontSize:'13px',color:'#3F414C',borderRadius:'7px',marginBottom:'2px',cursor:'pointer',userSelect:'none'};
    return{
      showLoader:false,
      navItems:NAV.map(n=>({...n,onClick:()=>this.nav(n.id),navStyle:navS(n.id==='proposals')})),
      periodOptions:(this.state.periods||[]).map(p=>({...p})),
      currentPeriodId,
      onChangePeriod:(e)=>this.setState({currentPeriodId:e.target.value}),
      currentPeriodName:cp.name||'',
      typeFilters,statusFilters,
      proposalList,isEmpty:proposalList.length===0,
      onNew:()=>{
        const today=new Date().toISOString().slice(0,10);
        this.setState({modal:{show:true,editId:null},formData:{type:'議案',status:'起草中',title:'',body:'',author:'',date:today,periodId:currentPeriodId}});
      },
      modalShow:modal.show,
      modalTitle:modal.editId?'議案を編集':'新規作成',
      formData,
      onInput:(e)=>this.setField(e.target.dataset.field,e.target.value),
      onSave:()=>{
        const{formData:f,modal:m}=this.state;
        if(!f.title){this.showToast('タイトルを入力してください');return;}
        if(m.editId){
          this.setState(s=>({proposals:s.proposals.map(p=>p.id===m.editId?{...p,...f}:p),modal:{show:false}}),()=>this.persist());
        }else{
          const n={...f,id:this.gen(),periodId:f.periodId||currentPeriodId,createdAt:new Date().toISOString()};
          this.setState(s=>({proposals:[...s.proposals,n],modal:{show:false}}),()=>this.persist());
        }
        this.showToast('保存しました');
      },
      onPrintCurrent:()=>{if(formData.title)this._doPrint(formData);},
      onCloseModal:()=>this.setState({modal:{show:false}}),
      stopProp:(e)=>e.stopPropagation(),
      syncStatusColor:{null:'#A1A1AA',syncing:'#f59e0b',ok:'#7BC095',error:'#E57373'}[String(syncStatus)]||'#A1A1AA',
      syncStatusLabel:syncStatus==='syncing'?'同期中...':syncStatus==='ok'?'✓ 同期済':syncStatus==='error'?'✗ オフライン':'未連携',
      syncProgressBarStyle:syncStatus==='syncing'?{}:{opacity:0,pointerEvents:'none'},
      onRefreshFromSS:()=>this.refreshFromSS(false),
      mainScrollRef:this._mainScrollRef,
      toast,showToast:!!toast,
    };
  }
}
</script>

<script>
window.__GAS_URL__ = 'https://script.google.com/macros/s/AKfycbxU09SfytsO8ylYla2wKNKr_Afuc8vB7HkHCX00htQuU6618fa3iBKGLCOqTN3TDOAtZA/exec';
// APIキーはlocalStorageから読み込みます（設定ページで初期設定してください）
const ALLOWED_EMAILS = ['clmiwa.hotline@gmail.com'];
const AUTH_KEY = 'nitta_auth_v2';
let __gasAuthEmails = [];
function prefetchAuthEmails(){
  const _pk=localStorage.getItem('nitta_api_key')||'';
  fetch('https://script.google.com/macros/s/AKfycbxU09SfytsO8ylYla2wKNKr_Afuc8vB7HkHCX00htQuU6618fa3iBKGLCOqTN3TDOAtZA/exec?key='+encodeURIComponent(_pk)+'&action=load')
    .then(r=>r.json())
    .then(d=>{ if(d&&d.authEmails) __gasAuthEmails=(d.authEmails||[]).map(e=>typeof e==='string'?e:e.email); })
    .catch(()=>{});
}
function getAuthEmails(){
  const local=(()=>{try{const d=JSON.parse(localStorage.getItem('nitta_v5')||'{}');return(d.authEmails||[]).map(e=>typeof e==='string'?e:e.email);}catch(e){return[];}})();
  return [...new Set([...local,...__gasAuthEmails])];
}
function showPortal(splash){
  document.documentElement.setAttribute('data-authed','1');
  var ov=document.getElementById('auth-overlay');
  if(ov) ov.classList.add('hidden');
}
function handleCredential(response){
  try{
    const payload=JSON.parse(atob(response.credential.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    const email=payload.email||'';
    if(![...ALLOWED_EMAILS,...getAuthEmails()].includes(email)){document.getElementById('auth-error').textContent=email+' はアクセス権限がありません';return;}
    if(document.getElementById('auto-login').checked)localStorage.setItem(AUTH_KEY,JSON.stringify({email,exp:Date.now()+30*24*60*60*1000}));
    sessionStorage.setItem('nitta_session','1');showPortal(true);
  }catch(e){document.getElementById('auth-error').textContent='認証エラーが発生しました';}
}
(function(){
  try{const s=JSON.parse(localStorage.getItem(AUTH_KEY)||'null');if(s&&s.exp>Date.now()){var _isn=sessionStorage.getItem('nitta_session');sessionStorage.setItem('nitta_session','1');showPortal(!_isn);return;}}catch(e){}
  prefetchAuthEmails();
  function _initGSI(){
    if(typeof google==='undefined'||!google.accounts)return;
    google.accounts.id.initialize({client_id:'367605623443-ahrthnavf0f09c63t6fcfa5hb1251s56.apps.googleusercontent.com',callback:handleCredential,auto_select:false});
    google.accounts.id.renderButton(document.getElementById('g_id_signin'),{theme:'outline',size:'large',text:'signin_with',locale:'ja',width:280});
  }
  window.onGoogleLibraryLoad=_initGSI; // SW高速化後の対策：GSI読込完了時に確実に呼ばれる
  window.onload=_initGSI;               // 万一onloadが後の場合も対応
})();
</script>
