name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # main への push で即起動（pathsフィルタなし）

  workflow_dispatch:   # 手動実行も可能

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true   # 連続pushで古いビルドをキャンセル

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (root directory)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # ルートディレクトリをそのままデプロイ

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
