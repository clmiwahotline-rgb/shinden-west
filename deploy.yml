name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'deploy/**'   # deploy/ フォルダの変更時のみ実行

  workflow_dispatch:   # 手動実行も可能

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload deploy/ folder only
        uses: actions/upload-pages-artifact@v3
        with:
          # deploy/ フォルダのみアップロード（35MBの uploads/ は含まない）
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
